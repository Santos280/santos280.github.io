<style>
  @keyframes morph1 {
    0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    50% { border-radius: 30% 60% 70% 40% / 40% 60% 30% 70%; }
  }

  @keyframes morph2 {
    0%, 100% { border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%; }
    50% { border-radius: 70% 30% 40% 60% / 30% 40% 60% 70%; }
  }

  @keyframes morph3 {
    0%, 100% { border-radius: 70% 30% 60% 40% / 30% 70% 40% 60%; }
    50% { border-radius: 40% 70% 30% 60% / 70% 40% 60% 30%; }
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -50px) scale(1.1); }
    66% { transform: translate(-20px, 30px) scale(0.9); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-40px, 40px) scale(0.9); }
    66% { transform: translate(50px, -30px) scale(1.1); }
  }

  @keyframes float3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, 60px) scale(1.05); }
    66% { transform: translate(-30px, -40px) scale(0.95); }
  }

  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body {
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab) !important;
    background-size: 400% 400% !important;
    animation: gradient-shift 15s ease infinite !important;
    min-height: 100vh !important;
    margin: 0 !important;
    padding: 20px !important;
    position: relative !important;
    overflow: hidden !important;
  }

  body::before {
    content: '' !important;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    z-index: 0 !important;
    pointer-events: none !important;
  }

  /* Morphing blob 1 */
  body::after {
    content: '' !important;
    position: fixed !important;
    width: 300px !important;
    height: 300px !important;
    background: rgba(255, 255, 255, 0.1) !important;
    top: 10% !important;
    left: 10% !important;
    border-radius: 60% 40% 30% 70% / 60% 30% 70% 40% !important;
    animation: morph1 8s ease-in-out infinite, float1 12s ease-in-out infinite !important;
    filter: blur(40px) !important;
    z-index: 1 !important;
    pointer-events: none !important;
  }

  .wrapper {
    position: relative !important;
    z-index: 10 !important;
  }

  /* Create additional blobs using pseudo-elements on other elements */
  main {
    position: relative !important;
  }
</style>

<svg style="position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none;">
  <defs>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
  </defs>

  <!-- Morphing blob 2 -->
  <g filter="url(#blur)">
    <ellipse cx="80%" cy="80%" rx="150" ry="150" fill="rgba(255, 255, 255, 0.08)"
      style="animation: morph2 10s ease-in-out infinite, float2 14s ease-in-out infinite;">
      <animate attributeName="rx" values="150;180;140;150" dur="10s" repeatCount="indefinite" />
      <animate attributeName="ry" values="150;140;180;150" dur="10s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <!-- Morphing blob 3 -->
  <g filter="url(#blur)">
    <ellipse cx="30%" cy="60%" rx="120" ry="120" fill="rgba(255, 255, 255, 0.08)"
      style="animation: morph3 12s ease-in-out infinite, float3 16s ease-in-out infinite;">
      <animate attributeName="rx" values="120;140;110;120" dur="12s" repeatCount="indefinite" />
      <animate attributeName="ry" values="120;110;140;120" dur="12s" repeatCount="indefinite" />
    </ellipse>
  </g>
</svg>
